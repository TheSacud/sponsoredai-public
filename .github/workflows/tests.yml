name: tests

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest

  package-smoke:
    name: wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check version consistency
        # Single source of truth (src/sai/__init__.py __version__) must agree with
        # pyproject (dynamic) and every npm package.json before we build anything.
        run: python scripts/check_versions.py
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel in clean venv
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/sai --version

  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Run tests
        working-directory: vscode-extension
        run: npm test
