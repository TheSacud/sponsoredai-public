name: release binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  pytest:
    name: pytest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2025]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest

  python-package:
    name: wheel smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel in clean venv
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/sai --version

  version-guard:
    name: version guard
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Assert tag matches the single source of truth
        # Nothing publishes unless the release tag, src/sai/__init__.py __version__,
        # pyproject (dynamic) and every npm package.json all agree. This is what
        # makes a version drift impossible to ship rather than only discouraged.
        run: |
          python scripts/check_versions.py
          TAG="${GITHUB_REF_NAME#v}"
          INIT="$(python - <<'PY'
          import re
          print(re.search(r'__version__\s*=\s*"([^"]+)"', open("src/sai/__init__.py").read()).group(1))
          PY
          )"
          if [ "$TAG" != "$INIT" ]; then
            echo "::error::release tag v$TAG does not match __version__ $INIT" >&2
            exit 1
          fi
          echo "version guard OK: v$TAG"

  build:
    name: build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            # onedir, like macOS: a onefile binary re-extracts its whole bundle
            # to a temp dir on every short CLI invocation (seconds of startup,
            # worse with on-access AV scanning). onedir extracts once at install.
            pyinstaller_mode: "--onedir"
            pyinstaller_output: dist/sai
            collect: "--collect-data certifi"
          - os: macos-latest
            platform: darwin
            arch: arm64
            # macOS uses onedir to avoid PyInstaller onefile extraction on every
            # short CLI invocation. The npm package ships bin/sai plus _internal.
            pyinstaller_mode: "--onedir"
            pyinstaller_output: dist/sai
            collect: "--collect-data certifi"
          - os: windows-2025
            platform: win32
            arch: x64
            # onedir, like macOS: a onefile .exe self-extracts its whole bundle
            # (Python runtime + winpty + certifi) to a temp dir on every launch,
            # which on Windows costs several seconds per `sai` command -- worse
            # under Defender scanning each extracted DLL of an unsigned exe.
            # onedir pays that cost once at install. See issue #1.
            pyinstaller_mode: "--onedir"
            pyinstaller_output: dist/sai
            # pywinpty is a native, lazily-imported dep; --collect-all bundles
            # its extension + binaries so the frozen exe can drive the ConPTY
            # compositor instead of silently falling back.
            collect: "--collect-data certifi --collect-all winpty"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install -e . pyinstaller
      - name: Build binary
        # --exclude-module sai.backend: the sponsor server is server-only and must
        # never ship inside the client binary. In the public client repo the module
        # is absent anyway; this keeps the build clean (and any source-repo build
        # client-only too). The VPS runs the backend from source, not this binary.
        run: python -m PyInstaller ${{ matrix.pyinstaller_mode }} --name sai --paths src --exclude-module sai.backend --exclude-module sai.dev_mock ${{ matrix.collect }} scripts/pyinstaller_entry.py
      - name: Package binary
        run: python scripts/package_binary.py --source "${{ matrix.pyinstaller_output }}" --output-dir release --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"
      - name: Smoke packaged binary
        shell: bash
        run: |
          # All platforms are now onedir: the executable lives inside the
          # packaged directory next to its _internal/ runtime.
          if [ "${{ matrix.platform }}" = "win32" ]; then
            BIN="release/sai-${{ matrix.platform }}-${{ matrix.arch }}/sai.exe"
          else
            BIN="release/sai-${{ matrix.platform }}-${{ matrix.arch }}/sai"
          fi
          "$BIN" --version
          python scripts/smoke_client_binary.py --binary "$BIN"
      - uses: actions/upload-artifact@v7
        with:
          name: sai-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*

  vscode-extension:
    name: VS Code extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm install
      - name: Test extension
        working-directory: vscode-extension
        run: npm test
      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package
      - name: Publish to VS Code Marketplace when configured
        # Publish only from the public repo (the build/test/package steps above
        # still run as CI in both repos); see publish-npm for the rationale.
        if: github.repository == 'TheSacud/sponsoredai-public'
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT is not configured; skipping Marketplace publish."
            exit 0
          fi
          NAME="$(node -p "require('./package.json').name")"
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          VERSION="$(node -p "require('./package.json').version")"
          # The extension is on its own version line, so a release tag that only
          # bumped the CLI must not fail here re-publishing an unchanged extension.
          # Skip when this version is already on the Marketplace; if the lookup is
          # unavailable, fall through to a normal publish attempt (prior behavior).
          PUBLISHED="$(npx --yes @vscode/vsce show "${PUBLISHER}.${NAME}" --json 2>/dev/null | jq -r '.versions[].version' 2>/dev/null || true)"
          if printf '%s\n' "$PUBLISHED" | grep -qx "$VERSION"; then
            echo "Extension ${PUBLISHER}.${NAME}@${VERSION} is already published; skipping."
            exit 0
          fi
          npx vsce publish --packagePath "${NAME}-${VERSION}.vsix"
      - uses: actions/upload-artifact@v7
        with:
          name: sai-vscode-extension
          path: vscode-extension/*.vsix

  github-release:
    name: upload release assets
    needs: [build, pytest, python-package, vscode-extension, version-guard]
    # The published GitHub release belongs to the public repo only (see publish-npm).
    if: startsWith(github.ref, 'refs/tags/') && github.repository == 'TheSacud/sponsoredai-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "SAI CLI binaries and VS Code extension"
          find release -maxdepth 1 -type f -print0 | xargs -0 gh release upload "$TAG" --clobber

  publish-npm:
    name: publish npm packages
    needs: [build, pytest, python-package, version-guard]
    # Only the public repo publishes. The same workflow lives in the private dev
    # repo (it is synced), so without this guard a tag pushed there would also try
    # to publish to npm. github.repository is the owner/name of the running repo.
    if: startsWith(github.ref, 'refs/tags/') && github.repository == 'TheSacud/sponsoredai-public'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true
      - name: Stage platform packages
        run: |
          # Every platform is now a onedir directory artifact (stage handles
          # both a file and a directory source; a directory ships bin/_internal).
          node npm/scripts/stage-platform-package.js --target darwin-arm64 --source release/sai-darwin-arm64
          node npm/scripts/stage-platform-package.js --target linux-x64 --source release/sai-linux-x64
          node npm/scripts/stage-platform-package.js --target win32-x64 --source release/sai-win32-x64
      - name: Verify npm package contents
        run: |
          npm pack ./npm/platform/darwin-arm64 --dry-run
          npm pack ./npm/platform/linux-x64 --dry-run
          npm pack ./npm/platform/win32-x64 --dry-run
          npm pack ./npm --dry-run
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm view @sponsoredai/cli-darwin-arm64@"$VERSION" >/dev/null 2>&1 || npm publish ./npm/platform/darwin-arm64 --access public --provenance
          npm view @sponsoredai/cli-linux-x64@"$VERSION" >/dev/null 2>&1 || npm publish ./npm/platform/linux-x64 --access public --provenance
          npm view @sponsoredai/cli-win32-x64@"$VERSION" >/dev/null 2>&1 || npm publish ./npm/platform/win32-x64 --access public --provenance
      - name: Publish launcher package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm view @sponsoredai/cli@"$VERSION" >/dev/null 2>&1 || npm publish ./npm --access public --provenance
